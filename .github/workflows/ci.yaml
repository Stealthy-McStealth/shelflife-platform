name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check services/

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - order-service
          - fulfillment-engine
          - warehouse-api
          - notification-service
          - analytics-service
          - auth-service
          - scheduler-service
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        env:
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: |
          if [ -d "tests" ]; then
            python -m pytest tests/ -v
          else
            echo "No tests directory found, skipping"
          fi

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - web-gateway
          - order-service
          - fulfillment-engine
          - warehouse-api
          - notification-service
          - analytics-service
          - auth-service
          - scheduler-service
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: services/${{ matrix.service }}
        run: docker build -t shelflife/${{ matrix.service }}:${{ github.sha }} .

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: shelflife
  labels:
    app: order-service
    team: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: shelflife/order-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shelflife-secrets
                  key: orders-db-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: shelflife-secrets
                  key: redis-url
            - name: FULFILLMENT_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: shelflife-config
                  key: fulfillment-queue-url
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: shelflife
spec:
  selector:
    app: order-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP

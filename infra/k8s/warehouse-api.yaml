apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-api
  namespace: shelflife
  labels:
    app: warehouse-api
    team: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: warehouse-api
  template:
    metadata:
      labels:
        app: warehouse-api
    spec:
      containers:
        - name: warehouse-api
          image: shelflife/warehouse-api:latest
          ports:
            - containerPort: 8083
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shelflife-secrets
                  key: warehouse-db-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: shelflife-secrets
                  key: redis-url
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: warehouse-api
  namespace: shelflife
spec:
  selector:
    app: warehouse-api
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP

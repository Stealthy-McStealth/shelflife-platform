apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: shelflife
  labels:
    app: analytics-service
    team: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: shelflife/analytics-service:latest
          ports:
            - containerPort: 8085
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shelflife-secrets
                  key: analytics-db-url
            - name: BUFFER_MAX_SIZE
              value: "10000"
            - name: FLUSH_INTERVAL_SECONDS
              value: "30"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 256m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: shelflife
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8085
      targetPort: 8085
  type: ClusterIP

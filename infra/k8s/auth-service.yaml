apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: shelflife
  labels:
    app: auth-service
    team: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: shelflife/auth-service:latest
          ports:
            - containerPort: 8086
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shelflife-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shelflife-secrets
                  key: auth-db-url
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 256m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: shelflife
spec:
  selector:
    app: auth-service
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP

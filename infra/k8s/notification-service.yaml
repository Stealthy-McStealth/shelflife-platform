apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: shelflife
  labels:
    app: notification-service
    team: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: shelflife/notification-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shelflife-secrets
                  key: sendgrid-api-key
            - name: SENDGRID_FROM_EMAIL
              value: "orders@shelflife.io"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 256m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: shelflife
spec:
  selector:
    app: notification-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP

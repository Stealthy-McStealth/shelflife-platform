<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; }
        .header { background: #1a1a2e; color: #ffffff; padding: 24px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; }
        .content { padding: 32px 24px; }
        .order-id { color: #666; font-size: 14px; margin-bottom: 16px; }
        .items-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        .items-table th { text-align: left; padding: 8px; border-bottom: 2px solid #eee; font-size: 13px; color: #666; }
        .items-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .total { font-size: 18px; font-weight: 600; text-align: right; margin-top: 16px; }
        .footer { padding: 24px; text-align: center; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Order Confirmed</h1>
        </div>
        <div class="content">
            <p>Hi {{customer_name}},</p>
            <p>Your order has been confirmed and is being prepared for fulfillment.</p>
            <div class="order-id">Order #{{order_id}}</div>
            <table class="items-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    {{items_html}}
                </tbody>
            </table>
            <div class="total">Total: ${{total_amount}}</div>
            <p>We'll send you a shipping update once your order is on its way.</p>
        </div>
        <div class="footer">
            <p>ShelfLife Inc. | support@shelflife.io</p>
        </div>
    </div>
</body>
</html>
